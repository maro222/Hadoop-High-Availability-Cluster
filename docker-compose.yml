    container_name: worker1
    hostname: worker1
    ports:
      - "8483:8480"
      - "9873:9870"
      - "8083:8088"
      - "2183:2181"
    command: >
      bash -c "
      echo 'source /etc/profile.d/hadoop.sh' >> /root/.bashrc &&
      service ssh start && 
      sleep infinity"
    volumes:
      - ./shared:/shared
      - ./ssh_keys:/root/.ssh
      - ./zoo_data/w1:/zoo_data  # Unique folder for ZK data
    networks:
      - cluster-network

  worker2:
