      - "8484:8480"
      - "9874:9870"
      - "8084:8088"
    command: >
      bash -c "
      echo 'source /etc/profile.d/hadoop.sh' >> /root/.bashrc &&
      service ssh start && 
      sleep infinity"
    volumes:
      - ./shared:/shared
      - ./ssh_keys:/root/.ssh  
    networks:
      - cluster-network

  worker3:
